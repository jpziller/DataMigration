# Local dev environment (roadmap #68) -- see docs/DOCKER.md for the full
# quickstart. Two services: `sqlserver` (SQL Server 2022 Developer
# Edition, free for non-production use) and `app` (this repo's Python +
# CLI environment, bind-mounted so host edits are reflected immediately
# -- see Dockerfile for why nothing is COPYed in). Requires Docker
# Compose v2 (`condition: service_healthy`).
#
# Nothing here changes any Hard Rule in CLAUDE.md -- this packages the
# exact same architecture (Python + SQL Server, `replicate`/`bulkops` as
# the only write paths), it doesn't add a new one.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      # Developer Edition -- free, full-featured, non-production use only
      # (matches README.md's own step 4, just containerized).
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env first (8+ chars, upper+lower+digit+symbol) -- see .env.example.}
    ports:
      # Published so a host tool (SSMS, Azure Data Studio, a host-installed
      # sqlcmd) can also connect directly -- not required for `docker
      # compose exec app ...` usage, which reaches this over the compose
      # network by service name instead.
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      # A coarse, dependency-free check -- only confirms the TCP listener
      # is up, not that SQL Server can actually authenticate a login yet
      # (those can genuinely differ by tens of seconds, especially on a
      # first-ever run). Deliberately does NOT call sqlcmd from inside
      # this image -- found in review: unlike the `app` image (this
      # repo's own Dockerfile, which explicitly installs mssql-tools18 and
      # is verified), whether mcr.microsoft.com/mssql/server bundles
      # sqlcmd at all was never actually confirmed, and relying on that
      # unverified assumption for a healthcheck this many things depend on
      # was the single riskiest part of the original design. `app`'s own
      # docker/init-db.sh does the real, finer-grained "can it actually
      # log in yet" check with its own retry loop instead.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  app:
    build: .
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - .:/app
      # Does NOT work as a way to reuse SF_AUTH_MODE=cli's host login --
      # confirmed live (2026-07-13): current `sf` CLI versions store org
      # auth in the host OS's native credential store (Windows Credential
      # Manager / macOS Keychain / libsecret), not in a plaintext file
      # under ~/.sf, so there is nothing here for a Linux container to
      # reach no matter how this mount is configured. Left commented out
      # for reference only -- see docs/DOCKER.md's auth-mode section for
      # the full finding. Use jwt or password mode instead (neither needs
      # this mount, or the `sf` binary, at all).
      #   Windows : ${USERPROFILE}/.sf:/root/.sf
      #   Mac/Linux: ${HOME}/.sf:/root/.sf
    env_file:
      - .env
    environment:
      # Overrides whatever SQL_* values are in .env -- inside this
      # network, "localhost" means the app container itself, not a SQL
      # Server the developer may also have installed on their host. This
      # wins over env_file above per Compose's own documented precedence
      # (environment: > env_file:); config.py's load_dotenv() also never
      # overrides an already-set OS environment variable, a second,
      # redundant reason it can't be silently clobbered. Every SF_* /
      # MOCKAROO_API_KEY / TICKET_SYSTEM_* value still comes from the
      # mounted .env via env_file above, unchanged -- only these SQL_*
      # connection settings are overridden.
      SQL_BACKEND: mssql
      SQL_SERVER: sqlserver
      SQL_DATABASE: ${SQL_DATABASE:-SF_Migration}
      SQL_DRIVER: ODBC Driver 18 for SQL Server
      SQL_TRUSTED_CONNECTION: "no"
      SQL_UID: sa
      SQL_PWD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env first (8+ chars, upper+lower+digit+symbol) -- see .env.example.}
      SQL_ENCRYPT: "yes"
      SQL_TRUST_SERVER_CERT: "yes"
    working_dir: /app
    tty: true
    stdin_open: true
    # Creates the (idempotent, safe-to-repeat) empty mirror database --
    # see docker/init-db.sh -- using this container's own SQL_* values
    # above, then leaves the container running for `docker compose exec
    # app <command>`. Not a separate init container/service (the
    # original design's riskiest assumption -- see the sqlserver
    # healthcheck comment above for why).
    command: ["sh", "-c", "sh docker/init-db.sh && sleep infinity"]

volumes:
  sqlserver_data:
